<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>联系我们</title>
    <style>
        .form-text {
            color: #888;
            background-color: #f5f5f5;
        }
        .good-contrast {
            color: #333;
            background: #fff;
        }
    </style>
</head>
<body>
    <h1>联系我们</h1>

    <form>
        <div>
            <label for="name">姓名</label>
            <input type="text" id="name" name="name">
        </div>
        <div>
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email">
        </div>
        <div>
            <label for="message">留言</label>
            <textarea id="message" name="message"></textarea>
        </div>
        <button type="submit">发送</button>
    </form>

    <p class="form-text">灰色文字，对比度可能不够</p>
    <p class="good-contrast">这段文字对比度正常</p>

    <p><a href="index.html">点击这里返回首页</a></p>

    <div id="contact-info">
        <h2>联系方式</h2>
        <p>电话: 12345678</p>
    </div>
</body>
</html>
